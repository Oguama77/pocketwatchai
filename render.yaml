# Render Blueprint (https://render.com/docs/blueprint-spec)
#
# Deploys the backend as a Docker service so the native Tesseract binary
# (installed in backend/Dockerfile) is available for OCR on scanned PDFs.
#
# To deploy: push this repo to GitHub, then in the Render dashboard choose
# "Blueprint" and point it at the repo. Render will pick up this file.
services:
  - type: web
    name: pocketwatch-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: TESSERACT_LANG
        value: eng
      # Render Starter has ~512 MB RAM. Default is 200 DPI which keeps peak
      # RSS around 250 MB even on 28-page scanned statements. Raise to 250/300
      # only if you are on a larger plan AND digit accuracy is too low.
      - key: OCR_DPI
        value: "200"
      # Optional safety caps (unset = no limit). Keep unset to process long PDFs.
      # - key: MAX_PDF_PAGES
      #   value: "200"
      # - key: PDF_TIME_BUDGET_SECONDS
      #   value: "300"
